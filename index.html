function renderAll(){svg='';htm='';const X1=50,X2=50+MW+20,Y0=50;ash(X1,Y0-6,'Round 1','r1');arl(X1,Y0+20,'M1–M9','r1');arl(X2,Y0+20,'M10–M18','r1');for(let i=0;i<18;i++){const c=i<9?0:1,r=c===0?i:i-9;rm(c===0?X1:X2,Y0+34+r*(MH+MG),R1[i][0],'r1-h','r1-c');}const R1B=Y0+34+8*(MH+MG)+MH;const PY=R1B+35;adv(X1,PY,MW*2+20+120,'Player Pools');const pcW=260;const wP=[],lP=[];R1.forEach(([id])=>{const m=M[id];wP.push({n:m.winner,t:gt(m.winner)});lP.push({n:m.loser,t:gt(m.loser)});});function pI(p,i){return`<div class="pi-item"><span class="pn">${i+1}</span><span style="flex:1">${p.n}</span>${tmb(p.t)}</div>`;}htm+=`<div class="pool-card" style="left:${X1}px;top:${PY+20}px;width:${pcW}px;"><div class="pool-hdr wb-p"><span>🏆 Winners</span><span class="ct">18</span></div><div class="pool-list">${wP.map(pI).join('')}</div></div>`;htm+=`<div class="pool-card" style="left:${X1+290}px;top:${PY+20}px;width:${pcW}px;"><div class="pool-hdr lb-p"><span>🔄 Losers</span><span class="ct">18</span></div><div class="pool-list">${lP.map(pI).join('')}</div></div>`;const PB=PY+20+18*26+50;const Ws=PB+30;adv(50,Ws,2800,'Winners Bracket');const Wy=Ws+26;ash(50,Wy,'Winners Bracket','wb');arl(50,Wy+28,'WB Play-In','pi');rm(50,Wy+42,'WBPI_1','pi-h','pi-c');rm(50,Wy+42+(MH+MG),'WBPI_2','pi-h','pi-c');const W16=50+MW+RG;arl(W16,Wy+28,'WB Round of 16','wb');for(let i=1;i<=8;i++)rm(W16,Wy+42+(i-1)*(MH+MG),`WBR16_${i}`,'wb-h','wb-c');cn(mr(P['WBPI_1']),ml(P['WBR16_1']),'var(--cp)');cn(mr(P['WBPI_2']),ml(P['WBR16_2']),'var(--cp)');const Wq=W16+MW+RG;for(let i=1;i<=4;i++){const y=(P[`WBR16_${i*2-1}`].y+P[`WBR16_${i*2}`].y)/2;rm(Wq,y,`WBQF_${i}`,'wb-h','wb-c');}arl(Wq,P['WBQF_1'].y-16,'WB Quarterfinals','wb');for(let i=1;i<=8;i++)cn(mr(P[`WBR16_${i}`]),ml(P[`WBQF_${Math.ceil(i/2)}`]),'var(--cw)');const Wsx=Wq+MW+RG;for(let i=1;i<=2;i++){const y=(P[`WBQF_${i*2-1}`].y+P[`WBQF_${i*2}`].y)/2;rm(Wsx,y,`WBSF_${i}`,'wb-h','wb-c');}arl(Wsx,P['WBSF_1'].y-16,'WB Semifinals','wb');for(let i=1;i<=4;i++)cn(mr(P[`WBQF_${i}`]),ml(P[`WBSF_${Math.ceil(i/2)}`]),'var(--cw)');const Wfx=Wsx+MW+RG,Wfy=(P['WBSF_1'].y+P['WBSF_2'].y)/2;rm(Wfx,Wfy,'WBF','wb-h','wb-c');arl(Wfx,Wfy-16,'WB Final','wb');for(let i=1;i<=2;i++)cn(mr(P[`WBSF_${i}`]),ml(P['WBF']),'var(--cw)');const WBb=Wy+42+7*(MH+MG)+MH;const Ls=WBb+45;adv(50,Ls,2800,'Losers Bracket');const Ly=Ls+26;ash(50,Ly,'Losers Bracket','lb');arl(50,Ly+28,'LB Play-In','pi');rm(50,Ly+42,'LBPI_1','pi-h','pi-c');rm(50,Ly+42+(MH+MG),'LBPI_2','pi-h','pi-c');const Ccx=50+MW+RG;arl(Ccx,Ly+28,'Crossover','pi');rm(Ccx,Ly+42,'CO_1','pi-h','pi-c');rm(Ccx,Ly+42+(MH+MG),'CO_2','pi-h','pi-c');cn(mr(P['LBPI_1']),ml(P['CO_1']),'var(--cp)');cn(mr(P['LBPI_2']),ml(P['CO_2']),'var(--cp)');dp(bc(P['WBPI_1']),ml(P['CO_1']),'var(--cd)');dp(bc(P['WBPI_2']),ml(P['CO_2']),'var(--cd)');const L16=Ccx+MW+RG;arl(L16,Ly+28,'LB Round of 16','lb');for(let i=1;i<=8;i++)rm(L16,Ly+42+(i-1)*(MH+MG),`LBR16_${i}`,'lb-h','lb-c');cn(mr(P['CO_1']),ml(P['LBR16_1']),'var(--cp)');cn(mr(P['CO_2']),ml(P['LBR16_2']),'var(--cp)');const L2=L16+MW+RG;for(let i=1;i<=8;i++)rm(L2,P[`LBR16_${i}`].y,`LBR2_${i}`,'lb-h','lb-c');arl(L2,P['LBR2_1'].y-16,'LB R2 (+WB R16 Drop)','lb');for(let i=1;i<=8;i++){cn(mr(P[`LBR16_${i}`]),ml(P[`LBR2_${i}`]),'var(--cl)');dp(bc(P[`WBR16_${i}`]),ml(P[`LBR2_${i}`]),'var(--cd)');}const L3=L2+MW+RG;for(let i=1;i<=4;i++){const y=(P[`LBR2_${i*2-1}`].y+P[`LBR2_${i*2}`].y)/2;rm(L3,y,`LBR3_${i}`,'lb-h','lb-c');}arl(L3,P['LBR3_1'].y-16,'LB Round 3','lb');for(let i=1;i<=8;i++)cn(mr(P[`LBR2_${i}`]),ml(P[`LBR3_${Math.ceil(i/2)}`]),'var(--cl)');const L4=L3+MW+RG;for(let i=1;i<=4;i++)rm(L4,P[`LBR3_${i}`].y,`LBR4_${i}`,'lb-h','lb-c');arl(L4,P['LBR4_1'].y-16,'LB R4 (+WB QF Drop)','lb');for(let i=1;i<=4;i++){cn(mr(P[`LBR3_${i}`]),ml(P[`LBR4_${i}`]),'var(--cl)');dp(bc(P[`WBQF_${i}`]),ml(P[`LBR4_${i}`]),'var(--cd)');}const L5=L4+MW+RG;for(let i=1;i<=2;i++){const y=(P[`LBR4_${i*2-1}`].y+P[`LBR4_${i*2}`].y)/2;rm(L5,y,`LBR5_${i}`,'lb-h','lb-c');}arl(L5,P['LBR5_1'].y-16,'LB Round 5','lb');for(let i=1;i<=4;i++)cn(mr(P[`LBR4_${i}`]),ml(P[`LBR5_${Math.ceil(i/2)}`]),'var(--cl)');const L6=L5+MW+RG;for(let i=1;i<=2;i++)rm(L6,P[`LBR5_${i}`].y,`LBR6_${i}`,'lb-h','lb-c');arl(L6,P['LBR6_1'].y-16,'LB R6 (+WB SF Drop)','lb');for(let i=1;i<=2;i++){cn(mr(P[`LBR5_${i}`]),ml(P[`LBR6_${i}`]),'var(--cl)');dp(bc(P[`WBSF_${i}`]),ml(P[`LBR6_${i}`]),'var(--cd)');}const Lsx=L6+MW+RG,Lsy=(P['LBR6_1'].y+P['LBR6_2'].y)/2;rm(Lsx,Lsy,'LBSF','lb-h','lb-c');arl(Lsx,Lsy-16,'LB Semifinal','lb');for(let i=1;i<=2;i++)cn(mr(P[`LBR6_${i}`]),ml(P['LBSF']),'var(--cl)');const Lfx=Lsx+MW+RG;rm(Lfx,Lsy,'LBF','lb-h','lb-c');arl(Lfx,Lsy-16,'LB Final','lb');cn(mr(P['LBSF']),ml(P['LBF']),'var(--cl)');dp(bc(P['WBF']),ml(P['LBF']),'var(--cd)');const Gx=Lfx+MW+RG+70,Gy=(P['WBF'].y+P['LBF'].y)/2;adv(Gx-50,Gy-45,380,'Grand Final');ash(Gx,Gy-20,'Grand Final','gf');arl(Gx,Gy+4,'Single Match · No Reset','gf');rm(Gx,Gy+20,'GF','gf-h','gf-c');cn(mr(P['WBF']),ml(P['GF']),'var(--cg)');cn(mr(P['LBF']),ml(P['GF']),'var(--cg)');const Chx=Gx+280+40,Chy=Gy+12,chN=M['GF'].done?M['GF'].winner:'???';htm+=`<div class="champ" style="left:${Chx}px;top:${Chy}px;"><span class="tr">🏆</span><span class="ti">${chN}</span><span class="su">Champion</span></div>`;svg+=`<path d="M${Gx+270},${Gy+20+HH+SH}L${Chx-6},${Gy+20+HH+SH}" stroke="var(--cg)"/>`;const cW=Chx+180,cH=Math.max(Ly+42+7*(MH+MG)+MH+100,Gy+MH+200);const cv=document.getElementById('cv');cv.style.width=cW+'px';cv.style.height=cH+'px';cv.innerHTML=`<svg class="cn" width="${cW}" height="${cH}">${svg}</svg>`+htm;window._nv={r1:{x:50,y:50,s:0.48},pools:{x:50,y:PY-15,s:0.52},wb:{x:50,y:Ws-8,s:0.32},lb:{x:50,y:Ls-8,s:0.26},gf:{x:Gx-180,y:Gy-70,s:0.6}};}

const isMob=window.innerWidth<768;let sc=isMob?0.22:0.32,px=10,py=10,dr=false,dx,dy;
function applyT(){document.getElementById('cv').style.transform=`translate(${px}px,${py}px) scale(${sc})`;document.getElementById('zd').textContent=Math.round(sc*100)+'%';}applyT();
const wr=document.getElementById('cw');
wr.addEventListener('mousedown',e=>{dr=true;dx=e.clientX-px;dy=e.clientY-py;document.body.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!dr)return;px=e.clientX-dx;py=e.clientY-dy;applyT();});
window.addEventListener('mouseup',()=>{dr=false;document.body.classList.remove('grabbing');});
wr.addEventListener('wheel',e=>{e.preventDefault();const r=wr.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,os=sc;sc=Math.min(2,Math.max(0.08,sc+(e.deltaY>0?-0.03:0.03)));px=mx-(mx-px)*(sc/os);py=my-(my-py)*(sc/os);applyT();},{passive:false});
let ld=0;
wr.addEventListener('touchstart',e=>{if(e.touches.length===1){dr=true;dx=e.touches[0].clientX-px;dy=e.touches[0].clientY-py;}if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:false});
wr.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&dr){px=e.touches[0].clientX-dx;py=e.touches[0].clientY-dy;applyT();}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);sc=Math.min(2,Math.max(0.08,sc+(d-ld)*0.003));ld=d;applyT();}},{passive:false});
wr.addEventListener('touchend',()=>{dr=false;});
document.getElementById('zi').addEventListener('click',()=>{sc=Math.min(2,sc+0.06);applyT();});
document.getElementById('zo').addEventListener('click',()=>{sc=Math.max(0.08,sc-0.06);applyT();});
document.getElementById('rv').addEventListener('click',()=>{sc=isMob?0.22:0.32;px=10;py=10;applyT();});
window.nv=function(k){const t=window._nv[k];if(!t)return;sc=isMob?t.s*0.65:t.s;px=-t.x*sc+(isMob?15:50);py=-t.y*sc+60;applyT();};
